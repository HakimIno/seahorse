data_query_task:
  description: >-
    Analyze the database schema to find information related to {objective}.
    You MUST use the 'database_query' tool to retrieve actual data.
    Perform a multi-table join if necessary to get a complete view.
    Clean the data and provide it in a structured format.
  expected_output: >-
    A summary of the dataset and the cleaned raw data prepared for analysis.
  agent: eng

deep_analysis_task:
  description: >-
    Take the data provided for {objective} and perform a comprehensive analysis.
    This MUST include:
    1. A detailed trend analysis.
    2. A forecast for the next 3 months using historical patterns.
    3. At least 2 premium visualizations (charts) showing the most critical insights.
    
    REPLY in the user's language (Thai if requested in Thai).
  expected_output: >-
    A high-end Markdown Executive Report in the user's language with embedded charts, 
    forecasting data, and strategic recommendations.
  agent: analyst
