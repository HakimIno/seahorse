scouting_task:
  description: >-
    Analyze matches for {objective}. Identify the best betting opportunities by 
    fetching live match data and odds. Search the web for recent team news if needed.
  expected_output: >-
    A detailed list of matches with xG trends, injury updates, and market odds.
  agent: scout

strategy_task:
  description: >-
    Synthesize the scouting report for {objective}. Calculate the 'Value' of the bets 
    and provide a bankroll strategy using the Kelly Criterion. Highlight any 
    significant edges found.
  expected_output: >-
    A professional markdown report with match predictions, value analysis, 
    and recommended stake sizes.
  agent: analyst
