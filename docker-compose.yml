services:
  postgres:
    image: postgres:16-alpine
    container_name: seahorse-postgres
    environment:
      POSTGRES_DB: seahorse_enterprise
      POSTGRES_USER: seahorse_user
      POSTGRES_PASSWORD: seahorse_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: seahorse-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: seahorse-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  postgres_data:
