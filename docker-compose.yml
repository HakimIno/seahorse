services:
  postgres:
    image: postgres:16-alpine
    container_name: seahorse-postgres
    environment:
      POSTGRES_DB: seahorse_enterprise
      POSTGRES_USER: seahorse_user
      POSTGRES_PASSWORD: seahorse_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
