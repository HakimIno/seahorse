services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: seahorse_user
      POSTGRES_PASSWORD: seahorse_password
      POSTGRES_DB: seahorse_enterprise
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seahorse_user -d seahorse_enterprise"]
      interval: 5s
      timeout: 5s
      retries: 5

  agent:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SEAHORSE_PG_URI: postgresql://seahorse_user:seahorse_password@db:5432/seahorse_enterprise
    volumes:
      - ./workspace:/app/workspace
      - /tmp/seahorse_charts:/tmp/seahorse_charts

  feeder:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SEAHORSE_PG_URI: postgresql://seahorse_user:seahorse_password@db:5432/seahorse_enterprise
    command: ["uv", "run", "python", "-m", "seahorse_ai.analysis.feeder"]

  telegram-agent:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SEAHORSE_PG_URI: postgresql://seahorse_user:seahorse_password@db:5432/seahorse_enterprise
    command:
      ["uv", "run", "python", "-m", "seahorse_ai.adapters.telegram_adapter"]

  graphdb:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/seahorse_password
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data:
