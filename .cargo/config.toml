[env]
# Pin the Python version for PyO3 builds to the Nix store path
# This ensures that both build-time and runtime use the same 3.12.13 version
PYO3_PYTHON = "/nix/store/gjw0dj160905a2z35r5pv9gb50mnav7r-python3-3.12.13/bin/python3"

[build]
# Use sccache for faster compilation across clean builds
rustc-wrapper = "sccache"

# Optimize linker settings for macOS
[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]
